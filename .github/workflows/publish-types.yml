name: Publish Core Types

on:
  push:
    branches: [main]
    paths:
      - 'packages/types/src/**'
      - 'packages/types/package.json'
      - 'packages/types/tsconfig.json'
  workflow_dispatch:

jobs:
  publish:
    name: Publish @delphian/tronrelic-types
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: npm ci

      - name: Build types
        working-directory: packages/types
        run: npm run build

      - name: Check if version already published
        id: check
        working-directory: packages/types
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version ${PACKAGE_VERSION} already published, skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version ${PACKAGE_VERSION} not yet published"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        if: steps.check.outputs.exists == 'false'
        working-directory: packages/types
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.exists }}" == "true" ]; then
            echo "Skipped: ${{ steps.check.outputs.name }}@${{ steps.check.outputs.version }} already published"
          else
            echo "Published: ${{ steps.check.outputs.name }}@${{ steps.check.outputs.version }}"
          fi
